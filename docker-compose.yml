services:
  wordpress:
    image: wordpress:latest
    container_name: wp-wordpress
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-1}
      # Freemius dev-only integration (Docker Compose only).
      # Set FREEMIUS_PRODUCT_SLUG and FREEMIUS_SECRET_KEY in your local `.env`.
      FREEMIUS_PRODUCT_SLUG: ${FREEMIUS_PRODUCT_SLUG:-}
      FREEMIUS_SECRET_KEY: ${FREEMIUS_SECRET_KEY:-}
      FF_MAX_BARS: ${FF_MAX_BARS:-5}
      FF_MAX_MESSAGES: ${FF_MAX_MESSAGES:-5}
      FF_MAX_COLUMNS: ${FF_MAX_COLUMNS:-4}
      FF_SCHEDULE: ${FF_SCHEDULE:-1}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', true);
        ini_set('opcache.enable', '0');
        define('WP_FS__DEV_MODE', true);
        define('WP_FS__SKIP_EMAIL_ACTIVATION', true);
        define('FF_MAX_MESSAGES', (int) getenv('FF_MAX_MESSAGES'));
        define('FF_MAX_COLUMNS', (int) getenv('FF_MAX_COLUMNS'));
        define('FF_SCHEDULE', (bool) getenv('FF_SCHEDULE'));
        $$fs_slug = getenv('FREEMIUS_PRODUCT_SLUG');
        $$fs_secret = getenv('FREEMIUS_SECRET_KEY');
        if (is_string($$fs_slug) && $$fs_slug !== '' && is_string($$fs_secret) && $$fs_secret !== '') {
          define('WP_FS__' . $$fs_slug . '_SECRET_KEY', $$fs_secret);
        }
    volumes:
      - wordpress_data:/var/www/html
      # Custom plugins (develop locally; container plugins dir is replaced)
      - ./plugins:/var/www/html/wp-content/plugins
    depends_on:
      - db
    networks:
      - wp-network

  # One-off: runs WP-CLI core install so you skip the browser setup wizard
  wp-install:
    image: wordpress:cli
    container_name: wp-install
    user: "0:0"
    volumes:
      - wordpress_data:/var/www/html
      - ./plugins:/var/www/html/wp-content/plugins
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_URL: ${WORDPRESS_URL:-http://localhost:8080}
      WORDPRESS_TITLE: ${WORDPRESS_TITLE:-Local WordPress}
      WORDPRESS_ADMIN_USER: ${WORDPRESS_ADMIN_USER:-admin}
      WORDPRESS_ADMIN_PASSWORD: ${WORDPRESS_ADMIN_PASSWORD:-admin}
      WORDPRESS_ADMIN_EMAIL: ${WORDPRESS_ADMIN_EMAIL:-admin@localhost}
      WORDPRESS_LOCALE: ${WORDPRESS_LOCALE:-en_US}
    command:
      - sh
      - -c
      - |
        cd /var/www/html
        echo 'Waiting for wp-config.php...'
        until [ -f wp-config.php ]; do sleep 2; done
        echo 'Waiting for database...'
        until php -r '$$m=new mysqli(getenv("WORDPRESS_DB_HOST"),getenv("WORDPRESS_DB_USER"),getenv("WORDPRESS_DB_PASSWORD"),getenv("WORDPRESS_DB_NAME"));exit($$m->connect_error?1:0);' 2>/dev/null; do sleep 2; done
        echo 'Database ready.'
        if wp core is-installed --allow-root 2>/dev/null; then
          echo 'WordPress already installed.'
        else
          wp core install --allow-root --url="$$WORDPRESS_URL" --title="$$WORDPRESS_TITLE" --admin_user="$$WORDPRESS_ADMIN_USER" --admin_password="$$WORDPRESS_ADMIN_PASSWORD" --admin_email="$$WORDPRESS_ADMIN_EMAIL" --locale="$$WORDPRESS_LOCALE" --skip-email
          echo 'WordPress installed.'
        fi
        mkdir -p /var/www/html/wp-content/uploads && chown -R www-data:www-data /var/www/html/wp-content
        if [ -d /var/www/html/wp-content/plugins/flex-top-bar ]; then
          wp plugin activate flex-top-bar --allow-root 2>/dev/null || true
          echo 'Flex Top Bar plugin activated.'
        fi
    depends_on:
      wordpress:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - wp-network
    restart: "no"

  db:
    image: mariadb:11
    container_name: wp-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wordpress}
      MYSQL_USER: ${MYSQL_USER:-wordpress}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-wordpress}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wp-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: phpMyAdmin for database management during development
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: wp-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER:-wordpress}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wp-network

volumes:
  wordpress_data:
  db_data:

networks:
  wp-network:
    driver: bridge
