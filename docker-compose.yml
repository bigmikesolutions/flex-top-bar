services:
  wordpress:
    image: wordpress:latest
    container_name: wp-wordpress
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-1}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', true);
    volumes:
      - wordpress_data:/var/www/html
      # Mount local wp-content for themes/plugins (optional - uncomment to use)
      # - ./wp-content:/var/www/html/wp-content
    depends_on:
      - db
    networks:
      - wp-network

  # One-off: runs WP-CLI core install so you skip the browser setup wizard
  wp-install:
    image: wordpress:cli
    container_name: wp-install
    volumes:
      - wordpress_data:/var/www/html
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_URL: ${WORDPRESS_URL:-http://localhost:8080}
      WORDPRESS_TITLE: ${WORDPRESS_TITLE:-Local WordPress}
      WORDPRESS_ADMIN_USER: ${WORDPRESS_ADMIN_USER:-admin}
      WORDPRESS_ADMIN_PASSWORD: ${WORDPRESS_ADMIN_PASSWORD:-admin}
      WORDPRESS_ADMIN_EMAIL: ${WORDPRESS_ADMIN_EMAIL:-admin@localhost}
    command: >
      sh -c "
      echo 'Waiting for wp-config.php...';
      until [ -f /var/www/html/wp-config.php ]; do sleep 2; done;
      if wp core is-installed 2>/dev/null; then
        echo 'WordPress already installed.';
      else
        wp core install
          --url=$${WORDPRESS_URL:-http://localhost:8080}
          --title=$${WORDPRESS_TITLE:-Local WordPress}
          --admin_user=$${WORDPRESS_ADMIN_USER:-admin}
          --admin_password=$${WORDPRESS_ADMIN_PASSWORD:-admin}
          --admin_email=$${WORDPRESS_ADMIN_EMAIL:-admin@localhost}
          --skip-email;
        echo 'WordPress installed.';
      fi
      "
    depends_on:
      wordpress:
        condition: service_started
    networks:
      - wp-network
    restart: "no"

  db:
    image: mariadb:11
    container_name: wp-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wordpress}
      MYSQL_USER: ${MYSQL_USER:-wordpress}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-wordpress}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wp-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: phpMyAdmin for database management during development
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: wp-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER:-wordpress}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wp-network

volumes:
  wordpress_data:
  db_data:

networks:
  wp-network:
    driver: bridge
