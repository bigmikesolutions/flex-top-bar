name: Flex Top Bar tag release (zip)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Package Top Bar zip (Freemius updater included)
        run: |
          npm run package:flex-top-bar:freemius
          mv release/flex-top-bar.zip release/flex-top-bar-freemius.zip

      - name: Package Top Bar zip (WP.org-safe)
        run: |
          npm run package:flex-top-bar

      - name: Create GitHub release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/flex-top-bar.zip
            release/flex-top-bar-freemius.zip

      - name: Derive release version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Copy release zip to repo root (Freemius requirement)
        run: cp release/flex-top-bar-freemius.zip flex-top-bar.zip

      - name: Deploy to Freemius
        uses: buttonizer/freemius-deploy@v0.1.3
        with:
          file_name: flex-top-bar.zip
          release_mode: beta
          version: ${{ steps.version.outputs.version }}
          sandbox: false
        env:
          PUBLIC_KEY: ${{ secrets.FREEMIUS_PUBLIC_KEY }}
          DEV_ID: ${{ secrets.FREEMIUS_DEV_ID }}
          SECRET_KEY: ${{ secrets.FREEMIUS_SECRET_KEY }}
          PLUGIN_SLUG: ${{ secrets.FREEMIUS_PLUGIN_SLUG }}
          PLUGIN_ID: ${{ secrets.FREEMIUS_PLUGIN_ID }}
