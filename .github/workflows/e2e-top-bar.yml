name: Top Bar E2E

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      WP_BASE_URL: http://localhost:8080
      WP_ADMIN_USER: admin
      WP_ADMIN_PASSWORD: admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Docker services
        run: docker compose up -d db wordpress

      - name: Install WordPress and activate plugin
        run: docker compose run --rm wp-install

      - name: Wait for WordPress to respond
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/wp-login.php >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "WordPress did not become ready in time"
          docker compose ps
          exit 1

      - name: Run single-bar e2e tests
        run: npm run test:e2e:single-bar

      - name: Run multi-bar e2e tests
        run: npm run test:e2e:multi-bar

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Docker logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop Docker services
        if: always()
        run: docker compose down -v
