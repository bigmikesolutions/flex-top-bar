name: Top Bar PR & main checks

on:
  # pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  php-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Top Bar Vite assets
        run: npm run build:top-bar

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        run: composer test

  npm-unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run npm unit tests
        run: npm test

  e2e:
    needs: [php-unit-tests, npm-unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      WP_BASE_URL: http://localhost:8080
      WP_ADMIN_USER: admin
      WP_ADMIN_PASSWORD: admin
      WP_ADMIN_EMAIL: admin@example.com
      WORDPRESS_ADMIN_USER: admin
      WORDPRESS_ADMIN_PASSWORD: admin
      WORDPRESS_ADMIN_EMAIL: admin@example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Top Bar Vite assets
        run: npm run build:top-bar

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Docker services
        run: docker compose up -d db wordpress

      - name: Install WordPress and activate plugin (idempotent)
        run: |
          timeout 90s docker compose run --rm \
            -e WORDPRESS_ADMIN_USER \
            -e WORDPRESS_ADMIN_PASSWORD \
            -e WORDPRESS_ADMIN_EMAIL \
            wp-install sh -lc '
            cd /var/www/html
            set -e
            if wp core is-installed --allow-root 2>/dev/null; then
              echo "WordPress already installed."
            else
              wp core install --allow-root \
                --url="http://localhost:8080" \
                --title="CI WordPress" \
                --admin_user="${WORDPRESS_ADMIN_USER}" \
                --admin_password="${WORDPRESS_ADMIN_PASSWORD}" \
                --admin_email="${WORDPRESS_ADMIN_EMAIL}" \
                --skip-email
            fi
            wp plugin activate flex-top-bar --allow-root
          '

      - name: Wait for WordPress install to be ready
        run: |
          for i in $(seq 1 60); do
            echo "Check $i/60: waiting for WordPress and DB..."

            if ! docker compose ps wordpress | grep -q "Up"; then
              sleep 1
              continue
            fi

            if curl -fsS --max-time 5 http://localhost:8080/wp-login.php >/dev/null; then
              echo "WordPress login endpoint is reachable."
              exit 0
            fi

            sleep 1
          done

          echo "WordPress did not finish installation in time"
          docker compose ps
          docker compose logs --no-color wordpress wp-install db
          exit 1

      - name: Run single-bar e2e tests
        run: npx playwright test --workers=1 --reporter=line --timeout=60000 --global-timeout=1200000 e2e/top-bar-single.spec.ts

      - name: Run multi-bar e2e tests
        run: npx playwright test --workers=1 --reporter=line --timeout=60000 --global-timeout=1200000 e2e/top-bar-multi.spec.ts

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Docker logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop Docker services
        if: always()
        run: docker compose down -v
