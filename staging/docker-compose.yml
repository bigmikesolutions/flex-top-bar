services:
  wordpress:
    image: wordpress:latest
    container_name: wp-staging-wordpress
    restart: unless-stopped
    command:
      - bash
      - -lc
      - |
        set -e
        # Allow uploading larger plugin/theme zips in staging.
        # (Useful for manual uploads when testing release packages.)
        printf '%s\n' \
          'upload_max_filesize=64M' \
          'post_max_size=64M' \
          'memory_limit=256M' \
          'max_execution_time=120' \
          > /usr/local/etc/php/conf.d/zz-staging-uploads.ini
        # Ensure WP core exists on the named volume.
        if [ ! -e /var/www/html/index.php ]; then
          cp -a /usr/src/wordpress/. /var/www/html/
        fi
        mkdir -p /var/www/html/wp-content/uploads /var/www/html/wp-content/upgrade
        # Local dev: ensure WP can write uploads/upgrade without FTP prompts.
        chown -R 33:33 /var/www/html/wp-content/uploads /var/www/html/wp-content/upgrade || true
        chmod -R a+rwX /var/www/html/wp-content/uploads /var/www/html/wp-content/upgrade
        exec apache2-foreground
    ports:
      - "8082:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_LOCALE: ${WORDPRESS_LOCALE:-en_US}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-1}
      FREEMIUS_PRODUCT_SLUG: ${FREEMIUS_PRODUCT_SLUG:-}
      FREEMIUS_SECRET_KEY: ${FREEMIUS_SECRET_KEY:-}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', true);
        define('FS_METHOD', 'direct');
        define('WPLANG', 'en_US');
        define('WP_FS__DEV_MODE', true);
        define('WP_FS__SKIP_EMAIL_ACTIVATION', true);
        $$fs_slug = getenv('FREEMIUS_PRODUCT_SLUG');
        $$fs_secret = getenv('FREEMIUS_SECRET_KEY');
        if (is_string($$fs_slug) && $$fs_slug !== '' && is_string($$fs_secret) && $$fs_secret !== '') {
          define('WP_FS__' . $$fs_slug . '_SECRET_KEY', $$fs_secret);
        }
    volumes:
      - wordpress_data_staging:/var/www/html
    depends_on:
      - db
    networks:
      - wp-staging-network

  # One-off: runs WP-CLI core install so you skip the browser setup wizard.
  # Staging helper: installs Plugin Check to validate WP.org compliance.
  wp-install:
    image: wordpress:cli
    container_name: wp-staging-install
    user: "0:0"
    volumes:
      - wordpress_data_staging:/var/www/html
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_URL: ${WORDPRESS_URL:-http://localhost:8082}
      WORDPRESS_TITLE: ${WORDPRESS_TITLE:-Local WordPress (staging)}
      WORDPRESS_ADMIN_USER: ${WORDPRESS_ADMIN_USER:-admin}
      WORDPRESS_ADMIN_PASSWORD: ${WORDPRESS_ADMIN_PASSWORD:-admin}
      # WordPress rejects "admin@localhost" as invalid.
      WORDPRESS_ADMIN_EMAIL: ${WORDPRESS_ADMIN_EMAIL:-admin@example.com}
      WORDPRESS_LOCALE: ${WORDPRESS_LOCALE:-en_US}
    command:
      - sh
      - -c
      - |
        set -e
        cd /var/www/html
        # If the `wordpress` container hasn't created wp-config.php yet,
        # use the bundled docker config as the standard official fallback.
        if [ ! -f wp-config.php ] && [ -f wp-config-docker.php ]; then
          cp -n wp-config-docker.php wp-config.php || true
        fi
        echo 'Waiting for wp-config.php...'
        until [ -f wp-config.php ]; do sleep 2; done
        echo 'Waiting for database...'
        until php -r '$$m=new mysqli(getenv("WORDPRESS_DB_HOST"),getenv("WORDPRESS_DB_USER"),getenv("WORDPRESS_DB_PASSWORD"),getenv("WORDPRESS_DB_NAME"));exit($$m->connect_error?1:0);' 2>/dev/null; do sleep 2; done
        echo 'Database ready.'
        if wp core is-installed --allow-root --url="$$WORDPRESS_URL" 2>/dev/null; then
          echo 'WordPress already installed.'
        else
          wp core install --allow-root --url="$$WORDPRESS_URL" --title="$$WORDPRESS_TITLE" --admin_user="$$WORDPRESS_ADMIN_USER" --admin_password="$$WORDPRESS_ADMIN_PASSWORD" --admin_email="$$WORDPRESS_ADMIN_EMAIL" --locale="$$WORDPRESS_LOCALE" --skip-email
          echo 'WordPress installed.'
        fi
        mkdir -p /var/www/html/wp-content/uploads /var/www/html/wp-content/upgrade \
          && (chown -R 33:33 /var/www/html/wp-content/uploads /var/www/html/wp-content/upgrade || true) \
          && chmod -R a+rwX /var/www/html/wp-content/uploads /var/www/html/wp-content/upgrade
        wp plugin install plugin-check --activate --allow-root 2>/dev/null || true
        echo 'Plugin Check plugin installed.'
    depends_on:
      wordpress:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - wp-staging-network
    restart: "no"

  # Staging helper: run arbitrary WP-CLI commands against the staging volume.
  # Example: docker compose -f staging/docker-compose.yml run --rm wp-cli plugin check flex-top-bar --allow-root
  wp-cli:
    image: wordpress:cli
    container_name: wp-staging-cli
    user: "0:0"
    volumes:
      - wordpress_data_staging:/var/www/html
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_URL: ${WORDPRESS_URL:-http://localhost:8082}
    depends_on:
      wordpress:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - wp-staging-network
    working_dir: /var/www/html
    entrypoint: ["wp"]
    restart: "no"

  db:
    image: mariadb:11
    container_name: wp-staging-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wordpress}
      MYSQL_USER: ${MYSQL_USER:-wordpress}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-wordpress}
    volumes:
      - db_data_staging:/var/lib/mysql
    networks:
      - wp-staging-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: wp-staging-phpmyadmin
    restart: unless-stopped
    ports:
      - "8083:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${MYSQL_USER:-wordpress}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wp-staging-network

volumes:
  wordpress_data_staging:
  db_data_staging:

networks:
  wp-staging-network:
    driver: bridge

